[project]
name = "nc-fns-eligibility-agent"
version = "0.1.0"
description = "POC AI eligibility screening agent for NC FNS (SNAP)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "openai>=1.40.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "python-dotenv>=1.0.0",
    "rich>=13.7.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "redis>=5.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "httpx>=0.27.0",
    "pre-commit>=3.7.0",
    "ruff>=0.12.0",
    "mypy>=1.10.0",
    "vulture>=2.11",
]

[project.scripts]
fns-agent = "src.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

# --- Quality gates (pre-commit / CI) ---

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes (unused imports/vars)
    "I",      # isort
    "B",      # bugbear
    "UP",     # pyupgrade
    "SIM",    # simplify
    "RUF",    # ruff-specific
    "N",      # pep8-naming
    "PTH",    # pathlib
    "T20",    # no print (use logging/rich)
    "ARG",    # unused function args
    "ERA",    # commented-out (dead) code
    "PLC",    # pylint convention
    "PLE",    # pylint error
    "PLW",    # pylint warning
    "ANN",    # type annotations
]
ignore = [
    "E501",   # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
# Tests may omit full annotation coverage; still ban Any (ANN401 not ignored).
"tests/**" = ["T20", "ARG", "PLR", "ANN001", "ANN201", "ANN202", "ANN204"]
# CLI launcher (stdlib-only) — prints operator URLs by design.
"start.py" = ["T20", "ANN"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
files = ["src"]
strict = true
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_any_explicit = true
disallow_any_unimported = true
disallow_subclassing_any = true
no_implicit_optional = true
check_untyped_defs = true
show_error_codes = true
pretty = true
plugins = ["pydantic.mypy"]
mypy_path = "."
namespace_packages = true
explicit_package_bases = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.vulture]
min_confidence = 80
paths = ["src", "tests"]
exclude = [".venv", "*egg-info*"]
